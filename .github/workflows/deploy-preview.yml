name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: deploy-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Skip when no app scaffold exists yet
        id: app
        run: |
          if [ ! -f package.json ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping preview deployment."
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Ensure Vercel secrets exist
        if: steps.app.outputs.present == 'true'
        run: |
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"

      - name: Set up Node.js
        if: steps.app.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.app.outputs.present == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.app.outputs.present == 'true'
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview artifact
        if: steps.app.outputs.present == 'true'
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.app.outputs.present == 'true'
        run: vercel deploy --prebuilt --token="$VERCEL_TOKEN"
