name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production:
    name: deploy-production
    runs-on: ubuntu-latest
    environment: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Skip when no app scaffold exists yet
        id: app
        run: |
          if [ ! -f package.json ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping production deployment."
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Detect Vercel secrets
        if: steps.app.outputs.present == 'true'
        id: vercel
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are missing; skipping production deployment."
          fi

      - name: Ensure Vercel secrets exist
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        run: |
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"

      - name: Set up Node.js
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.app.outputs.present == 'true' && steps.vercel.outputs.present == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
